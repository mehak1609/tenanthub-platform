apiVersion: v1
kind: ServiceAccount
metadata:
  name: acme-corp-sa
  namespace: acme-corp

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: acme-corp-role
  namespace: acme-corp
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list"]
    resourceNames: ["acme-corp-credentials"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: acme-corp-rolebinding
  namespace: acme-corp
subjects:
  - kind: ServiceAccount
    name: acme-corp-sa
    namespace: acme-corp
roleRef:
  kind: Role
  apiGroup: rbac.authorization.k8s.io
  name: acme-corp-role