name: PR Diff — Kubernetes Changes

on:
  pull_request:
    branches:
      - main

jobs:
  diff:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4

      - name: Setup Kustomize
        uses: multani/action-setup-kustomize@v1
        with:
          version: 5.3.0

      - name: Build PR branch manifests
        run: |
          kustomize build task3/k8s > /tmp/pr-output.yaml

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Build main branch manifests
        run: |
          kustomize build task3/k8s > /tmp/main-output.yaml

      - name: Generate diff
        id: diff
        run: |
          DIFF=$(diff /tmp/main-output.yaml /tmp/pr-output.yaml || true)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post diff as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const diff = `${{ steps.diff.outputs.diff }}`;
            const body = diff
              ? `## Kubernetes Changes in this PR\n\`\`\`diff\n${diff}\n\`\`\``
              : `## Kubernetes Changes in this PR\nNo changes detected.`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });